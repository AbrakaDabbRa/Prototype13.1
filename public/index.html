<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gameify</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- AUTH PAGE -->
  <div id="auth-page" class="hidden">
    <div class="auth-wrap">
      <div class="auth-card">
        <div class="auth-logo">GAMEIFY</div>
        <div class="auth-sub">Track your journey</div>

        <div class="auth-tabs">
          <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
          <button class="auth-tab"        onclick="switchTab('register')">Register</button>
        </div>

        <div id="auth-error" class="auth-error"></div>

        <!-- Login -->
        <div id="login-form">
          <div class="field">
            <label for="l-username">Username</label>
            <input id="l-username" type="text" placeholder="Your username" autocomplete="username">
          </div>
          <div class="field">
            <label for="l-password">Password</label>
            <input id="l-password" type="password" placeholder="Your password" autocomplete="current-password">
          </div>
          <button class="btn btn-primary" id="btn-login" onclick="login()">Sign In</button>
        </div>

        <!-- Register -->
        <div id="register-form" class="hidden">
          <div class="field">
            <label for="r-username">Username</label>
            <input id="r-username" type="text" placeholder="Choose a username" autocomplete="username">
          </div>
          <div class="field">
            <label for="r-password">Password</label>
            <input id="r-password" type="password" placeholder="At least 6 characters" autocomplete="new-password">
          </div>
          <button class="btn btn-primary" id="btn-register" onclick="register()">Create Account</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main-app" class="hidden">
    <div class="app">

      <header>
        <div class="logo">
          <h1>GAMEIFY</h1>
          <p class="tagline">Track your journey</p>
        </div>
        <div class="header-right">
          <div class="stats-bar">
            <div class="stat"><span class="num" id="stat-total">0</span><span class="lbl">Total</span></div>
            <div class="stat"><span class="num" id="stat-playing">0</span><span class="lbl">Playing</span></div>
            <div class="stat"><span class="num" id="stat-backlog">0</span><span class="lbl">Backlog</span></div>
            <div class="stat"><span class="num" id="stat-done">0</span><span class="lbl">Done</span></div>
          </div>
          <div class="user-pill">👾 <span id="user-display"></span></div>
          <button class="btn btn-ghost btn-sm" onclick="logout()">Sign Out</button>
        </div>
      </header>

      <!-- Add Game -->
      <section class="panel">
        <h2 class="panel-title">Add Game</h2>
        <div class="form-grid">
          <div class="field">
            <label for="f-title">Title</label>
            <input id="f-title" type="text" placeholder="e.g. Elden Ring" autocomplete="off">
          </div>
          <div class="field">
            <label for="f-platform">Platform</label>
            <select id="f-platform">
              <option value="PC">PC</option>
              <option value="PlayStation">PlayStation</option>
              <option value="Xbox">Xbox</option>
              <option value="Switch">Switch</option>
              <option value="Mobile">Mobile</option>
            </select>
          </div>
          <div class="field">
            <label for="f-status">Status</label>
            <select id="f-status">
              <option value="Backlog">Backlog</option>
              <option value="Playing">Currently Playing</option>
              <option value="Completed">Completed</option>
            </select>
          </div>
          <div class="field">
            <label>Rating</label>
            <div class="rating-input" id="f-rating-stars">
              <span class="star" data-v="1">★</span>
              <span class="star" data-v="2">★</span>
              <span class="star" data-v="3">★</span>
              <span class="star" data-v="4">★</span>
              <span class="star" data-v="5">★</span>
            </div>
          </div>
          <div class="field field-submit">
            <button class="btn btn-primary" id="btn-add" onclick="addGame()">+ Add Game</button>
          </div>
        </div>
      </section>

      <!-- Library -->
      <section class="panel">
        <h2 class="panel-title">My Library</h2>

        <div class="search-wrap">
          <svg class="search-icon" width="15" height="15" viewBox="0 0 20 20" fill="none">
            <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.8"/>
            <path d="m14.5 14.5 3.5 3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <input type="search" id="search" placeholder="Search games…" oninput="onSearch(this.value)">
        </div>

        <div class="filters">
          <button class="filter-btn active" onclick="setFilter('All', this)">All</button>
          <button class="filter-btn"        onclick="setFilter('Backlog', this)">Backlog</button>
          <button class="filter-btn"        onclick="setFilter('Playing', this)">Playing</button>
          <button class="filter-btn"        onclick="setFilter('Completed', this)">Completed</button>
        </div>

        <div class="game-grid" id="game-grid">
          <div class="loader"><div class="spinner"></div></div>
        </div>
      </section>

    </div>
  </div>

  <!-- EDIT MODAL -->
  <div class="modal-overlay" id="modal" onclick="handleModalClick(event)">
    <div class="modal">
      <h2>Edit Game</h2>
      <div class="form-stack">
        <input type="hidden" id="e-id">
        <div class="field">
          <label for="e-title">Title</label>
          <input id="e-title" type="text">
        </div>
        <div class="field">
          <label for="e-platform">Platform</label>
          <select id="e-platform">
            <option value="PC">PC</option>
            <option value="PlayStation">PlayStation</option>
            <option value="Xbox">Xbox</option>
            <option value="Switch">Switch</option>
            <option value="Mobile">Mobile</option>
          </select>
        </div>
        <div class="field">
          <label for="e-status">Status</label>
          <select id="e-status">
            <option value="Backlog">Backlog</option>
            <option value="Playing">Currently Playing</option>
            <option value="Completed">Completed</option>
          </select>
        </div>
        <div class="field">
          <label>Rating</label>
          <div class="rating-input" id="e-rating-stars">
            <span class="star" data-v="1">★</span>
            <span class="star" data-v="2">★</span>
            <span class="star" data-v="3">★</span>
            <span class="star" data-v="4">★</span>
            <span class="star" data-v="5">★</span>
          </div>
        </div>
        <div class="field">
          <label for="e-notes">Notes</label>
          <textarea id="e-notes" rows="3" placeholder="Any thoughts…"></textarea>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="/app.js"></script>
</body>
</html>
